<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flux Login</title>
</head>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="/loginscripts/style.css">
<body>
    <div class="colormode d-flex justify-content-end">
    <img id="colormode" src="images/sunwhite.png" alt="color-mode" onclick="colormode(event)">
  </div>
    <section class="login">
    <div class="container d-flex justify-content-center p-5">
        <div class="login-card p-4 shadow b-5 rounded-4 p-4" id="container">
   <h1>Flux</h1>
   <h2>Entrar</h2>
        <form method="POST" novalidate>
        <div class="form-group mb-3">
            <label for="login" class="form-label">Email</label>
            <input type="email" id="login" class="form-control" placeholder="insira um email">
            <span id="erroemail"></span>
        </div>
        <div class="form-group mb-3">
        <label for="password" class="form-label">Senha</label>
        <input type="password" id="password" class="form-control" placeholder="insira uma senha">
        <span id="erropassword"></span>    
       </div> 
       <button id="btn-enviar" class="btn btn-primary btn-lg w-100" type="submit">Entrar</button>
    </form>
    <a href="/index.html">Criar conta</a>
    </div> 
        </div>
         
    </section>
<script src="/loginscripts/login-script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
